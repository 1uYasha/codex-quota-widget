<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:" />
    <title>ChatGPT Quota</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-state="loading">
    <main class="widget">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>

      <header class="titlebar">
        <div class="brand">
          <span id="trafficLight" class="traffic-light loading" aria-hidden="true"></span>
          <div>
            <span id="brandName" class="brand-name">ChatGPT Quota</span>
            <span id="stateText" class="brand-state">读取中</span>
          </div>
        </div>
        <div class="window-actions">
          <button id="settingsBtn" class="icon-button more-button" title="更多" aria-label="更多" aria-expanded="false">···</button>
          <button id="minimizeBtn" class="icon-button" title="隐藏" aria-label="隐藏">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14" />
            </svg>
          </button>
          <button id="closeBtn" class="icon-button danger" title="退出" aria-label="退出">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>
      </header>

      <aside id="settingsPanel" class="settings-panel" hidden>
        <div class="settings-heading">
          <strong id="settingsTitle">更多</strong>
          <span id="settingsHint">快捷操作与显示设置</span>
        </div>
        <div class="menu-actions">
          <button id="refreshBtn" class="panel-action" type="button">刷新</button>
          <button id="pinBtn" class="panel-action active" type="button">取消置顶</button>
          <button id="langBtn" class="panel-action" type="button">English</button>
        </div>
        <label class="setting-row">
          <span id="showFiveHourLabel">5小时额度</span>
          <input id="showFiveHourInput" type="checkbox" checked />
        </label>
        <label class="setting-row">
          <span id="showWeeklyLabel">7天额度</span>
          <input id="showWeeklyInput" type="checkbox" checked />
        </label>
        <label class="setting-row">
          <span id="showLiquidLabel">水位显示</span>
          <input id="showLiquidInput" type="checkbox" checked />
        </label>
        <label class="setting-source">
          <span id="liquidSourceLabel">水位代表</span>
          <select id="liquidSourceInput">
            <option id="liquidFiveHourOption" value="fiveHour">5小时额度</option>
            <option id="liquidWeeklyOption" value="weekly" selected>7天额度</option>
          </select>
        </label>
      </aside>

      <section class="content">
        <div id="liquidMeter" class="liquid-meter" aria-label="ChatGPT Quota 剩余额度">
          <div class="glass-rim"></div>
          <div id="liquidFill" class="liquid-fill">
            <div class="wave wave-one"></div>
            <div class="wave wave-two"></div>
          </div>
          <div class="shine"></div>
          <div class="meter-copy">
            <strong id="remaining">--%</strong>
            <span id="remainingLabel">剩余</span>
          </div>
        </div>

        <div class="quota-panel">
          <div id="fiveHourCard" class="quota-card primary">
            <span id="fiveHourLabel">5小时</span>
            <strong id="fiveHourText">--</strong>
          </div>
          <div id="weeklyCard" class="quota-card primary">
            <span id="weeklyLabel">7天</span>
            <strong id="weeklyText">--</strong>
          </div>
          <div class="quota-card slim">
            <span id="planLabel">计划</span>
            <strong id="planText">--</strong>
          </div>
          <div class="quota-card token-card">
            <span id="todayTokenLabel">今日 Token</span>
            <strong id="todayTokenText">--</strong>
          </div>
        </div>
      </section>

      <footer class="status">
        <span id="statusDot" class="status-dot loading"></span>
        <span id="statusText">正在读取额度...</span>
      </footer>
    </main>

    <script src="./widget-logic.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
